<!DOCTYPE html>
<html lang="en">
<head>
    <title>Verify OTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Check Your Email</h2>
        <p class="text-gray-500 mb-6">We sent a 6-digit verification code to <strong>{{ session['temp_email'] }}</strong></p>
        
        <form method="POST" class="space-y-5">
            <input type="text" name="otp" required placeholder="Enter 6-digit OTP" class="w-full px-4 py-4 text-center text-2xl tracking-[0.5em] border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-600 outline-none">
            <button type="submit" class="w-full bg-purple-600 text-white font-bold py-3 rounded-xl hover:bg-purple-700 transition shadow-md">Verify & Login</button>
        </form>
    </div>
</body>
</html>
