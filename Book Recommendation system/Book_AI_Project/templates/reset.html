<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create New Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Create New Password</h2>
        
        <form method="POST" class="space-y-5">
            <input type="text" name="otp" required placeholder="6-digit Email OTP" class="w-full px-4 py-3 text-center tracking-widest border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-600 outline-none">
            <input type="password" name="new_password" required placeholder="Enter new password" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-600 outline-none">
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 transition shadow-md">Save & Login</button>
        </form>
    </div>
</body>
</html>
