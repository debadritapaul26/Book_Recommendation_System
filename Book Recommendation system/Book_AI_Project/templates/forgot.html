<!DOCTYPE html>
<html lang="en">
<head>
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-900 mb-2 text-center">Reset Password</h2>
        <p class="text-gray-500 mb-6 text-center text-sm">Enter your email and we'll send you an OTP to reset your password.</p>
        
        <form method="POST" class="space-y-5">
            <input type="email" name="email" required placeholder="name@example.com" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-600 outline-none">
            <button type="submit" class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl hover:bg-gray-800 transition">Send OTP</button>
        </form>
        <div class="text-center mt-6">
            <a href="{{ url_for('login') }}" class="text-sm text-purple-600 hover:underline">Back to Login</a>
        </div>
    </div>
</body>
</html>
